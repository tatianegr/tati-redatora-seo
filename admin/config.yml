backend:
  name: github
  repo: tatianegr/tati-redatora-seo
  branch: main
  base_url: "https://tati-decap-proxy.gomesrodrigues1995.workers.dev"
  auth_endpoint: "/auth"
publish_mode: simple
media_folder: "assets/uploads"
public_folder: "/tati-redatora-seo/assets/uploads"
slug:
  encoding: "ascii"
  clean_accents: true
collections:
  - name: "blog"
    label: "Blog"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - label: "Slug"
        name: "slug"
        widget: "string"
        required: true
        hint: "usado como parte do nome do arquivo; use letras minúsculas e hífens"
      - { label: "Descrição", name: "description", widget: "string", required: false }
      - { label: "Resumo", name: "summary", widget: "string", required: false }
      - { label: "Imagem de capa", name: "cover_image", widget: "image", required: false }
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        field: { label: "Tag", name: "tag", widget: "string" }
      - { label: "Data", name: "date", widget: "datetime" }
      - label: "Categoria"
        name: "categories"
        widget: "select"
        multiple: true
        min: 1
        max: 1
        options:
          - "Textos Institucionais"
          - "Páginas de Produto/Serviço"
          - "Posts de Blog"
      - { label: "Conteúdo", name: "body", widget: "markdown" }

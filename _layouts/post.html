---
layout: default
---
<article class="card pad">
  <header style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap;">
    <div>
      <h1 style="margin:0 0 6px;">{{ page.title }}</h1>
      <p style="margin:0; font-size:12px; color:var(--muted);">
        <time datetime="{{ page.date | date_to_xmlschema }}">
          {{ page.date | date: "%d/%m/%Y" }}
        </time>
        {% if page.categories and page.categories.size > 0 %}
          · {{ page.categories | join: ", " }}
        {% endif %}
      </p>
    </div>
    <a class="btn ghost" href="{{ '/blog/' | relative_url }}">Voltar para o blog</a>
  </header>
  {% if page.cover %}
    <img src="{{ page.cover }}" alt="Capa do post {{ page.title }}" style="margin-top:14px; border:1px solid var(--line); border-radius: var(--radius);" />
  {% endif %}
  <div style="margin-top:16px; max-width:72ch; margin-left:auto; margin-right:auto;">
    {{ content }}
  </div>
</article>
